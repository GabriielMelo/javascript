<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Utilizando DOM</title>
    <style>
        h1{
            background-color: rgba(90, 5, 5, 0.301)  ;
            width: 270px;
            text-align: center;
            border-radius: 5px;
            margin: auto;
            
        }
        body{
            background-color: rgba(0, 0, 0, 0.5);
            color: rgba(255, 255, 255, 0.61);
        }
    </style>
</head>
<body>
        <h1>Aprendendo DOM</h1>
        <p>Aqui vai o resultado </p>
        <p>Aprendendo a usar <strong>DOM</strong> em JavaScript</p>
       
            <div id="msg">Clique aqui</div>
       
        <script>
            var p1 = document.getElementsByTagName('p')[0] /*numero adicionado aos colchetes irá selecionar qual p será inserido na variavel de acordo com seu indice.*/
            document.write('Está escrito assim : ' + p1.innerHTML)
            p1.style.color = '#005200'
            var d = document.getElementById('msg')
            document.write(d.innerHTML)
            d.style.color = 'gold'
            
        </script>
</body>
</html>
